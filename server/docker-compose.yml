services:
  postgres:
    image: postgres:latest
    container_name: agora_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agora
    ports:
      - "5432:5432"
    volumes:
      - agora_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agora"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agora_postgres_data:
